docker_publish:
  stage: image
  image:
    name: moby/buildkit:rootless
    entrypoint: ['']
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  needs:
    - verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+(\.[0-9]+){2}.*$/'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH =~ /^codex\/.+/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - |
      set -eu

      mkdir -p image

      local_image="node-hiprint-transit:sha-$CI_COMMIT_SHORT_SHA"
      image_tags="$local_image"

      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        image_tags="$image_tags node-hiprint-transit:$CI_COMMIT_TAG"
        case "$CI_COMMIT_TAG" in
          v[0-9]*.[0-9]*.[0-9]*)
            image_tags="$image_tags node-hiprint-transit:${CI_COMMIT_TAG#v}"
            ;;
        esac
      else
        image_tags="$image_tags node-hiprint-transit:$CI_COMMIT_REF_SLUG"
        if [ "${CI_COMMIT_BRANCH:-}" = "$CI_DEFAULT_BRANCH" ]; then
          image_tags="$image_tags node-hiprint-transit:latest"
        fi
      fi

      tar_names=""
      for tag in $image_tags; do
        if [ -z "$tar_names" ]; then
          tar_names="$tag"
        else
          tar_names="$tar_names,$tag"
        fi
      done

      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --output type=docker,name="$tar_names",dest=image/node-hiprint-transit.tar

      {
        for tag in $image_tags; do
          echo "$tag"
        done
      } > image/image-tags.txt

      if [ -n "${CI_REGISTRY:-}" ] && [ -n "${CI_REGISTRY_IMAGE:-}" ]; then
        mkdir -p ~/.docker
        printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}\n' \
          "$CI_REGISTRY" \
          "$CI_REGISTRY_USER" \
          "$CI_REGISTRY_PASSWORD" > ~/.docker/config.json

        registry_tags="$CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"

        if [ -n "${CI_COMMIT_TAG:-}" ]; then
          registry_tags="$registry_tags $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
          case "$CI_COMMIT_TAG" in
            v[0-9]*.[0-9]*.[0-9]*)
              registry_tags="$registry_tags $CI_REGISTRY_IMAGE:${CI_COMMIT_TAG#v}"
              ;;
          esac
        else
          registry_tags="$registry_tags $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
          if [ "${CI_COMMIT_BRANCH:-}" = "$CI_DEFAULT_BRANCH" ]; then
            registry_tags="$registry_tags $CI_REGISTRY_IMAGE:latest"
          fi
        fi

        registry_names=""
        for tag in $registry_tags; do
          if [ -z "$registry_names" ]; then
            registry_names="$tag"
          else
            registry_names="$registry_names,$tag"
          fi
        done

        if buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --output type=image,name="$registry_names",push=true; then
          for tag in $registry_tags; do
            echo "$tag"
          done >> image/image-tags.txt
        else
          echo "GitLab Container Registry publish failed; keeping image tar artifact for local use." >&2
        fi
      else
        echo "GitLab Container Registry variables are unavailable; keeping image tar artifact for local use." >&2
      fi
  artifacts:
    name: 'node-hiprint-transit-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA'
    expire_in: 7 days
    paths:
      - image/node-hiprint-transit.tar
      - image/image-tags.txt
