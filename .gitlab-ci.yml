variables:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DOCKER_BUILDKIT: '1'
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ''

workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+(\.[0-9]+){2}.*$/'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH =~ /^codex\/.+/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

stages:
  - verify
  - image

verify:
  stage: verify
  image: node:24
  before_script:
    - npm ci --no-audit --no-fund
  script:
    - npm run verify

docker_image:
  stage: image
  image: docker:29
  services:
    - name: docker:29-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
  needs:
    - verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+(\.[0-9]+){2}.*$/'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH =~ /^codex\/.+/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  before_script:
    - docker info
  script:
    - |
      set -eu

      mkdir -p image

      local_image="node-hiprint-transit:sha-$CI_COMMIT_SHORT_SHA"
      registry_tags=""

      if [ -n "${CI_REGISTRY_IMAGE:-}" ]; then
        registry_tags="$CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA"
      fi

      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        if [ -n "$registry_tags" ]; then
          registry_tags="$registry_tags $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
          case "$CI_COMMIT_TAG" in
            v[0-9]*.[0-9]*.[0-9]*)
              registry_tags="$registry_tags $CI_REGISTRY_IMAGE:${CI_COMMIT_TAG#v}"
              ;;
          esac
        fi
      else
        if [ -n "$registry_tags" ]; then
          registry_tags="$registry_tags $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
          if [ "${CI_COMMIT_BRANCH:-}" = "$CI_DEFAULT_BRANCH" ]; then
            registry_tags="$registry_tags $CI_REGISTRY_IMAGE:latest"
          fi
        fi
      fi

      build_tags="-t $local_image"
      for tag in $registry_tags; do
        build_tags="$build_tags -t $tag"
      done

      docker build $build_tags .
      docker save "$local_image" -o image/node-hiprint-transit.tar
      {
        echo "$local_image"
        for tag in $registry_tags; do
          echo "$tag"
        done
      } > image/image-tags.txt

      if [ -n "${CI_REGISTRY:-}" ] && [ -n "$registry_tags" ]; then
        if echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin; then
          for tag in $registry_tags; do
            docker push "$tag"
          done
        else
          echo "GitLab Container Registry login failed; keeping image tar artifact for local use." >&2
        fi
      else
        echo "GitLab Container Registry variables are unavailable; keeping image tar artifact for local use." >&2
      fi
  artifacts:
    name: 'node-hiprint-transit-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA'
    expire_in: 7 days
    paths:
      - image/node-hiprint-transit.tar
      - image/image-tags.txt
